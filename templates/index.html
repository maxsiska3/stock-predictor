<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kouros: Next-Day Predictor</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus+SC&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <img src="{{ url_for('static', filename='kouros-mark.svg') }}" alt="" class="brand-mark" width="32" height="32">
        <div>
          <h1 class="brand-name">Kouros</h1>
          <p class="brand-tag">Next-day direction predictor</p>
        </div>
      </div>
      <p class="header-note">RandomForest on OHLCV technicals · local only</p>
    </header>

    <section class="controls panel">
      <form id="single-form" class="single-form">
        <label class="field-label" for="ticker-input">Predict one ticker</label>
        <div class="field-row">
          <input id="ticker-input" type="text" placeholder="e.g. AAPL" autocomplete="off" spellcheck="false" maxlength="12">
          <button type="submit" class="btn btn-accent">Predict</button>
        </div>
      </form>
      <div class="control-actions">
        <button type="button" id="refresh-btn" class="btn btn-primary">Run all {{ watchlist_count }} tickers</button>
        <span id="status" class="status" aria-live="polite"></span>
      </div>
    </section>

    <section class="summary panel" id="summary" hidden>
      <div class="stat">
        <span class="stat-value stat-up" id="stat-up">0</span>
        <span class="stat-label">Predicted up</span>
      </div>
      <div class="stat">
        <span class="stat-value stat-down" id="stat-down">0</span>
        <span class="stat-label">Predicted down</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-failed">0</span>
        <span class="stat-label">Failed</span>
      </div>
    </section>

    <section class="panel table-panel">
      <div class="table-head">
        <h2>Predictions</h2>
        <span class="table-meta" id="table-meta">Loading…</span>
      </div>
      <div class="table-wrap">
        <table class="pred-table">
          <thead>
            <tr>
              <th>Ticker</th>
              <th>Direction</th>
              <th>Confidence</th>
            </tr>
          </thead>
          <tbody id="pred-body">
            <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:52px"></div></td><td><div class="skeleton-bar" style="width:64px"></div></td><td><div class="skeleton-bar" style="width:44px"></div></td></tr>
            <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:44px"></div></td><td><div class="skeleton-bar" style="width:64px"></div></td><td><div class="skeleton-bar" style="width:44px"></div></td></tr>
            <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:60px"></div></td><td><div class="skeleton-bar" style="width:64px"></div></td><td><div class="skeleton-bar" style="width:44px"></div></td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <footer class="footer">
      Experimental ML signals. Not financial advice, market data via yfinance for personal use only.
    </footer>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
