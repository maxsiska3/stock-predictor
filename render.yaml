services:
  - type: web
    name: kouros
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
      - key: DATABASE_PATH
        value: /data/kouros.db
    disk:
      name: kouros-data
      mountPath: /data
      sizeGB: 1
